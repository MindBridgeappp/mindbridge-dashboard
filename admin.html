<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBridge — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d16; --bg2: #0d1829; --bg3: #111f33;
      --border: #1b2a40; --text: #e2eaf4; --muted: #5a7090; --muted2: #8ba3bf;
      --green: #4ade80; --green-dim: rgba(74,222,128,0.12); --green-border: rgba(74,222,128,0.3);
      --blue: #38bdf8; --red: #f87171; --orange: #fb923c; --accent: #16a34a;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }

    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: radial-gradient(ellipse at 30% 20%, rgba(22,163,74,0.08) 0%, transparent 60%), var(--bg); }
    .login-card { width: 100%; max-width: 380px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; }
    .login-logo { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--green); margin-bottom: 4px; }
    .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; letter-spacing: 1px; text-transform: uppercase; }
    .login-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
    .login-input:focus { border-color: var(--green); }
    .login-input::placeholder { color: var(--muted); }
    .login-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
    .login-error { font-size: 13px; color: var(--red); margin-top: 10px; display: none; text-align: center; }

    #admin-screen { display: none; }
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(7,13,22,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--green); }
    .topbar-badge { font-size: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .topbar-btn:hover { border-color: var(--green); color: var(--green); }
    .topbar-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
    .stat-icon { font-size: 22px; margin-bottom: 10px; }
    .stat-value { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); margin-bottom: 4px; }
    .stat-value.small { font-size: 20px; margin-top: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat-card.highlight { border-color: var(--green-border); background: var(--green-dim); }
    .stat-card.highlight .stat-value { color: var(--green); }
    .stat-card.gold { border-color: rgba(250,204,21,0.3); background: rgba(250,204,21,0.08); }
    .stat-card.gold .stat-value { color: #facc15; }
    .stat-card.blue { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }
    .stat-card.blue .stat-value { color: var(--blue); }

    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-title { font-family: monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .chart-wrap { position: relative; height: 180px; }

    .search-wrap { position: relative; }
    .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px 7px 34px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; width: 200px; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 10px 14px; font-size: 10px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--bg3); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 12px 14px; color: var(--text); vertical-align: middle; }
    .psi-name { font-weight: 600; }
    .psi-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .badge:hover { opacity: 0.8; }
    .badge-paying { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.3); }
    .badge-free { background: rgba(90,112,144,0.15); color: var(--muted); border: 1px solid var(--border); }
    .no-results { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 10px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .last-updated { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 16px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🌿 MindBridge</div>
    <div class="login-sub">Painel Administrativo</div>
    <input class="login-input" type="password" id="admin-password" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')checkPassword()" />
    <button class="login-btn" onclick="checkPassword()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta.</div>
  </div>
</div>

<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🌿 MindBridge</span>
      <span class="topbar-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="loadData()">↻ Atualizar</button>
      <button class="topbar-btn danger" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="main">
    <div class="last-updated" id="last-updated"></div>
    <div id="content"><div class="loading"><div class="spinner"></div> Carregando dados...</div></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://vuhxuzyovxfufakbrint.supabase.co','sb_publishable_BqnA-s8cqQrWNOSWFAOSnA_3qJyhVwi');

const ADMIN_PASSWORD = 'Samuel2609';
let activityChart = null;
let allPsychologists = [], allPatients = [], allRecords = [];
// Controle local de pagantes (salvo em localStorage)
let payingPsis = JSON.parse(localStorage.getItem('mb_paying') || '[]');

function checkPassword() {
  const pwd = document.getElementById('admin-password').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-password').value = '';
  document.getElementById('login-error').style.display = 'none';
}

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando dados...</div>';
  const [psiRes, patRes, recRes] = await Promise.all([
    sb.from('psychologists').select('*').order('created_at', { ascending: false }),
    sb.from('patients').select('*').order('created_at', { ascending: false }),
    sb.from('records').select('*').order('created_at', { ascending: false }),
  ]);
  allPsychologists = psiRes.data || [];
  allPatients = patRes.data || [];
  allRecords = recRes.data || [];
  document.getElementById('last-updated').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
  renderContent(allPsychologists);
}

function togglePaying(psiId) {
  if (payingPsis.includes(psiId)) {
    payingPsis = payingPsis.filter(id => id !== psiId);
  } else {
    payingPsis = [...payingPsis, psiId];
  }
  localStorage.setItem('mb_paying', JSON.stringify(payingPsis));
  searchPsi(document.querySelector('.search-input')?.value || '');
  // Atualiza stat de pagantes
  document.getElementById('stat-paying').textContent = payingPsis.length;
}

function renderContent(psychologists) {
  const now = new Date();
  const last7 = new Date(now - 7*24*60*60*1000);
  const last30 = new Date(now - 30*24*60*60*1000);

  // Métricas
  const activePsis = allPsychologists.filter(p => {
    const pPatIds = allPatients.filter(pat => pat.psychologist_id === p.id).map(pat => pat.id);
    return allRecords.some(r => pPatIds.includes(r.patient_id) && new Date(r.created_at) >= last7);
  });

  const totalAudios = allRecords.filter(r => r.has_audio).length;
  const recLast30 = allRecords.filter(r => new Date(r.created_at) >= last30);

  // Humor mais registrado
  const moodCounts = {};
  allRecords.forEach(r => { if (r.mood) moodCounts[r.mood] = (moodCounts[r.mood]||0) + 1; });
  const topMood = Object.entries(moodCounts).sort((a,b)=>b[1]-a[1])[0];
  const moodEmojis = { 'Alegria':'😊','Calma':'😌','Empolgação':'🤩','Cansaço':'😴','Preocupação':'😟','Tristeza':'😢','Ansiedade':'😰','Raiva':'😤','Frustração':'😣','Vazio':'😶' };

  // Psicólogo mais ativo (mais registros nos últimos 30 dias)
  let topPsi = null, topPsiCount = 0;
  allPsychologists.forEach(p => {
    const pPatIds = allPatients.filter(pat => pat.psychologist_id === p.id).map(pat => pat.id);
    const count = recLast30.filter(r => pPatIds.includes(r.patient_id)).length;
    if (count > topPsiCount) { topPsiCount = count; topPsi = p; }
  });

  // Gráfico
  const byDay = {};
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now - i*86400000);
    byDay[d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})] = 0;
  }
  recLast30.forEach(r => {
    const key = new Date(r.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    if (byDay[key] !== undefined) byDay[key]++;
  });

  const tableRows = buildTableRows(psychologists);

  const html = `
    <div class="stats-grid" style="animation:fadeUp 0.3s ease">
      <div class="stat-card highlight">
        <div class="stat-icon">🧠</div>
        <div class="stat-value">${allPsychologists.length}</div>
        <div class="stat-label">Psicólogos cadastrados</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${activePsis.length}</div>
        <div class="stat-label">Ativos (últimos 7 dias)</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-icon">💰</div>
        <div class="stat-value" id="stat-paying">${payingPsis.length}</div>
        <div class="stat-label">Pagantes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">${allPatients.length}</div>
        <div class="stat-label">Pacientes totais</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-value">${allRecords.length}</div>
        <div class="stat-label">Registros totais</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎙</div>
        <div class="stat-value">${totalAudios}</div>
        <div class="stat-label">Áudios gravados</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon">${topMood ? (moodEmojis[topMood[0]]||'😶') : '—'}</div>
        <div class="stat-value small">${topMood ? topMood[0] : '—'}</div>
        <div class="stat-label">Humor mais registrado</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon">🏆</div>
        <div class="stat-value small">${topPsi ? topPsi.name.split(' ')[0] : '—'}</div>
        <div class="stat-label">Psicólogo mais ativo (30d)</div>
      </div>
    </div>

    <div class="section" style="animation:fadeUp 0.4s ease">
      <div class="section-title">📊 Registros por dia — últimos 30 dias</div>
      <div class="chart-wrap"><canvas id="activity-chart"></canvas></div>
    </div>

    <div class="section" style="animation:fadeUp 0.5s ease">
      <div class="section-header">
        <div class="section-title">🧠 Psicólogos (${allPsychologists.length})</div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" placeholder="Buscar psicólogo..." oninput="searchPsi(this.value)" />
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CRP</th>
              <th>Pacientes</th>
              <th>Registros</th>
              <th>Último registro</th>
              <th>Pagante</th>
              <th>Cadastro</th>
            </tr>
          </thead>
          <tbody id="psi-table-body">${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;

  // Gráfico
  if (activityChart) { activityChart.destroy(); activityChart = null; }
  const ctx = document.getElementById('activity-chart').getContext('2d');
  const labels = Object.keys(byDay);
  const data = Object.values(byDay);
  activityChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map(v => v > 0 ? 'rgba(74,222,128,0.5)' : 'rgba(27,42,64,0.5)'),
        borderColor: data.map(v => v > 0 ? '#4ade80' : '#1b2a40'),
        borderWidth: 1, borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + ' registros' } } },
      scales: {
        x: { ticks: { color:'#5a7090', font:{size:9}, maxRotation:0, maxTicksLimit:10 }, grid: { display: false } },
        y: { ticks: { color:'#5a7090', font:{size:9}, stepSize:1 }, grid: { color:'#1b2a40' }, beginAtZero: true }
      }
    }
  });
}

function buildTableRows(psychologists) {
  const now = new Date();
  const last7 = new Date(now - 7*24*60*60*1000);
  return psychologists.map(p => {
    const pPats = allPatients.filter(pat => pat.psychologist_id === p.id);
    const pPatIds = pPats.map(pat => pat.id);
    const pRecs = allRecords.filter(r => pPatIds.includes(r.patient_id));
    const lastRec = pRecs[0];
    const isPaying = payingPsis.includes(p.id);
    return `<tr>
      <td><div class="psi-name">${p.name}</div><div class="psi-email">${p.email}</div></td>
      <td style="color:var(--muted);font-size:12px">${p.crp || '—'}</td>
      <td>${pPats.length}</td>
      <td>${pRecs.length}</td>
      <td style="font-size:12px;color:var(--muted2)">${lastRec ? new Date(lastRec.created_at).toLocaleDateString('pt-BR') : '—'}</td>
      <td><span class="badge ${isPaying ? 'badge-paying' : 'badge-free'}" onclick="togglePaying(${p.id})">${isPaying ? '💰 Pagante' : 'Beta'}</span></td>
      <td style="font-size:12px;color:var(--muted)">${new Date(p.created_at).toLocaleDateString('pt-BR')}</td>
    </tr>`;
  }).join('');
}

function searchPsi(q) {
  const filtered = q.trim() === ''
    ? allPsychologists
    : allPsychologists.filter(p => p.name.toLowerCase().includes(q.toLowerCase()) || p.email.toLowerCase().includes(q.toLowerCase()));
  if (filtered.length === 0) {
    document.getElementById('psi-table-body').innerHTML = '<tr><td colspan="7" class="no-results">Nenhum psicólogo encontrado.</td></tr>';
    return;
  }
  document.getElementById('psi-table-body').innerHTML = buildTableRows(filtered);
}
</script>
</body>
</html>
