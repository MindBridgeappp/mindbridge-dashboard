<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBridge — Painel do Psicólogo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d16; --bg2: #0d1829; --bg3: #111f33;
      --border: #1b2a40; --border2: #243650;
      --text: #e2eaf4; --muted: #5a7090; --muted2: #8ba3bf;
      --green: #4ade80; --green-dim: rgba(74,222,128,0.12); --green-border: rgba(74,222,128,0.3);
      --blue: #38bdf8; --red: #f87171; --orange: #fb923c; --accent: #16a34a;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }

    /* AUTH */
    #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: radial-gradient(ellipse at 30% 20%, rgba(22,163,74,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(56,189,248,0.05) 0%, transparent 60%), var(--bg); }
    .auth-card { width: 100%; max-width: 420px; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; animation: fadeUp 0.5s ease; }
    .auth-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--green); margin-bottom: 6px; }
    .auth-tagline { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 9px; border: none; border-radius: 8px; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .auth-tab.active { background: var(--accent); color: white; font-weight: 600; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--muted2); margin-bottom: 6px; letter-spacing: 0.5px; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--green); }
    .form-input::placeholder { color: var(--muted); }
    .btn-primary { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 0 24px rgba(74,222,128,0.2); }
    .btn-primary:hover { opacity: 0.9; } .btn-primary:active { transform: scale(0.98); } .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; padding: 12px; font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; }
    .auth-success { background: var(--green-dim); border: 1px solid var(--green-border); border-radius: 10px; padding: 12px; font-size: 13px; color: var(--green); margin-bottom: 16px; display: none; }

    /* APP */
    #app-screen { display: none; min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(7,13,22,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--green); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .topbar-user { font-size: 12px; color: var(--muted2); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-logout:hover { border-color: var(--muted); color: var(--text); }
    .main-content { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .view { display: none; animation: fadeUp 0.3s ease; }
    .view.active { display: block; }

    /* DASHBOARD */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); }
    .page-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .btn-add { display: flex; align-items: center; gap: 6px; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; box-shadow: 0 0 20px rgba(74,222,128,0.15); white-space: nowrap; }
    .btn-add:hover { opacity: 0.9; }
    .search-wrap { margin-bottom: 16px; position: relative; }
    .search-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 16px 11px 40px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--green); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
    .patients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .patient-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
    .patient-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .patient-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .patient-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; flex-shrink: 0; }
    .risk-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .risk-high { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .risk-medium { background: rgba(251,146,60,0.15); color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }
    .risk-ok { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .patient-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .patient-meta { font-size: 11px; color: var(--muted); }
    .patient-link-box { margin-top: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
    .patient-link-txt { font-size: 10px; color: var(--muted); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .btn-copy { background: transparent; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 8px; color: var(--muted2); font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-copy:hover { border-color: var(--green); color: var(--green); }
    .btn-delete { background: transparent; border: 1px solid rgba(248,113,113,0.3); border-radius: 6px; padding: 4px 8px; color: var(--red); font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .btn-delete:hover { background: rgba(248,113,113,0.1); }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; color: var(--muted2); margin-bottom: 8px; }

    /* MODALS */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 28px 24px; width: 100%; max-width: 500px; animation: slideUp 0.25s ease; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-confirm { flex: 1; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-confirm-danger { flex: 1; padding: 12px; background: var(--red); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* DETAIL */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; cursor: pointer; margin-bottom: 20px; transition: color 0.2s; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 8px 0; }
    .back-btn:hover { color: var(--text); }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .detail-header-left { display: flex; align-items: center; gap: 12px; }
    .detail-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; flex-shrink: 0; }
    .detail-name { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .detail-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .filter-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 10px; padding: 4px; width: fit-content; }
    .filter-tab { padding: 6px 14px; border: none; border-radius: 7px; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .filter-tab.active { background: var(--bg2); color: var(--text); font-weight: 600; border: 1px solid var(--border); }

    /* SECTIONS */
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .section-title { font-family: monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 150px; cursor: pointer; }
    .chart-hint { font-size: 10px; color: var(--muted); text-align: right; margin-top: 6px; }
    .alert-box { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.3); border-radius: 14px; padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 8px; align-items: flex-start; }
    .alert-box-text { font-size: 13px; color: var(--orange); line-height: 1.5; }
    .trigger-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .trigger-label { font-size: 12px; color: var(--text); width: 70px; flex-shrink: 0; }
    .trigger-bar-wrap { flex: 1; background: var(--bg3); border-radius: 20px; height: 6px; overflow: hidden; }
    .trigger-bar { height: 100%; border-radius: 20px; transition: width 0.6s ease; }
    .trigger-count { font-size: 11px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }

    /* RECORDS */
    .records-list { display: flex; flex-direction: column; gap: 10px; }
    .record-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
    .record-card.risk { border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.04); }
    .record-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
    .record-mood { display: flex; align-items: center; gap: 8px; }
    .record-emoji { font-size: 18px; }
    .record-label { font-size: 14px; font-weight: 600; }
    .record-date { font-size: 10px; color: var(--muted); font-family: monospace; }
    .record-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .record-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .record-text { margin-top: 8px; font-size: 12px; color: var(--muted2); font-style: italic; line-height: 1.6; background: var(--bg3); border-radius: 8px; padding: 8px 12px; }
    .record-audio { margin-top: 8px; }
    .no-records { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* LEMBRETES */
    .reminder-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; min-height: 32px; }
    .reminder-chip { display: flex; align-items: center; gap: 6px; background: var(--green-dim); border: 1px solid var(--green-border); border-radius: 20px; padding: 5px 12px; font-size: 13px; color: var(--green); }
    .reminder-chip-remove { background: none; border: none; color: var(--green); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; opacity: 0.7; }
    .reminder-add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .reminder-time-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; flex: 1; min-width: 120px; }
    .reminder-time-input:focus { border-color: var(--green); }
    .btn-reminder-add { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .reminder-empty { font-size: 13px; color: var(--muted); }

    /* MISC */
    .loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--muted); gap: 10px; font-size: 14px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg2); border: 1px solid var(--green-border); border-radius: 12px; padding: 12px 18px; font-size: 13px; color: var(--green); z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* DESKTOP overrides */
    @media (min-width: 640px) {
      .main-content { padding: 40px 32px; }
      .topbar { padding: 0 32px; height: 60px; }
      .topbar-logo { font-size: 20px; }
      .topbar-user { max-width: none; font-size: 13px; }
      .btn-logout { font-size: 13px; padding: 6px 14px; }
      .page-title { font-size: 28px; }
      .patients-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
      .patient-card { padding: 20px; }
      .detail-name { font-size: 26px; }
      .detail-avatar { width: 56px; height: 56px; font-size: 22px; }
      .filter-tab { padding: 7px 16px; font-size: 13px; }
      .section { padding: 20px; margin-bottom: 16px; }
      .chart-wrap { height: 160px; }
      .modal-overlay { align-items: center; padding: 24px; }
      .modal { border-radius: 20px; padding: 32px; max-width: 420px; }
      .toast { left: auto; right: 24px; transform: translateY(10px); }
      .toast.show { transform: translateY(0); }
      .record-card { padding: 18px 20px; }
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🌿 MindBridge</div>
    <div class="auth-tagline">Painel do Psicólogo — Beta</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Cadastrar</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="auth-success" class="auth-success"></div>
    <div id="tab-login">
      <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" type="email" id="login-email" placeholder="seu@email.com" /></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">Entrar</button>
    </div>
    <div id="tab-register" style="display:none">
      <div class="form-group"><label class="form-label">Nome completo</label><input class="form-input" type="text" id="reg-name" placeholder="Dra. Ana Silva" /></div>
      <div class="form-group"><label class="form-label">CRP</label><input class="form-input" type="text" id="reg-crp" placeholder="06/123456" /></div>
      <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" type="email" id="reg-email" placeholder="seu@email.com" /></div>
      <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="reg-password" placeholder="Mínimo 6 caracteres" /></div>
      <button class="btn-primary" id="btn-register" onclick="handleRegister()">Criar conta</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">🌿 MindBridge</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-name"></span>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </div>
  </div>
  <div class="main-content">
    <div class="view active" id="view-dashboard">
      <div class="page-header">
        <div>
          <div class="page-title">Meus Pacientes</div>
          <div class="page-sub" id="patients-count"></div>
        </div>
        <button class="btn-add" onclick="openAddModal()">+ Novo</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="search-input" placeholder="Buscar paciente..." oninput="filterPatients()" />
      </div>
      <div id="patients-container"><div class="loading"><div class="spinner"></div> Carregando...</div></div>
    </div>

    <div class="view" id="view-detail">
      <button class="back-btn" onclick="showDashboard()">← Voltar</button>
      <div class="detail-header">
        <div class="detail-header-left">
          <div class="detail-avatar" id="detail-avatar"></div>
          <div>
            <div class="detail-name" id="detail-name"></div>
            <div class="detail-meta" id="detail-meta"></div>
          </div>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter(7, this)">7d</button>
          <button class="filter-tab" onclick="setFilter(30, this)">30d</button>
          <button class="filter-tab" onclick="setFilter(1, this)">Hoje</button>
        </div>
      </div>
      <div class="section" id="reminders-section">
        <div class="section-title">🔔 Lembretes de registro</div>
        <div class="reminder-chips" id="reminder-chips"></div>
        <div class="reminder-add-row">
          <input type="time" class="reminder-time-input" id="reminder-time-input" />
          <button class="btn-reminder-add" onclick="addReminder()">+ Adicionar</button>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:10px">Ativo após publicação nas lojas.</div>
      </div>
      <div id="detail-content"><div class="loading"><div class="spinner"></div> Carregando...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Novo Paciente</div>
    <div class="modal-sub">Um código único será gerado para enviar ao paciente.</div>
    <div id="modal-error" class="auth-error"></div>
    <div class="form-group"><label class="form-label">Nome do paciente</label><input class="form-input" type="text" id="new-patient-name" placeholder="Ex: Maria Oliveira" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
      <button class="btn-confirm" id="btn-add-patient" onclick="handleAddPatient()">Criar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-title">Excluir Paciente</div>
    <div class="modal-sub" id="delete-modal-sub"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
      <button class="btn-confirm-danger" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient('https://vuhxuzyovxfufakbrint.supabase.co','sb_publishable_BqnA-s8cqQrWNOSWFAOSnA_3qJyhVwi');

let currentUser = null, currentPsychologist = null, currentPatient = null;
let currentRecords = [], currentFilter = 7, currentColor = '#16a34a';
let moodChart = null;
let allPatients = [], allRecords = [];
let patientToDelete = null;
let selectedDayDate = null;
let currentReminders = [];

const tagColors = {
  'Trabalho':  { bg: 'rgba(56,189,248,0.15)',  border: 'rgba(56,189,248,0.4)',  text: '#38bdf8' },
  'Relação':   { bg: 'rgba(236,72,153,0.15)',   border: 'rgba(236,72,153,0.4)',  text: '#ec4899' },
  'Família':   { bg: 'rgba(74,222,128,0.15)',   border: 'rgba(74,222,128,0.4)',  text: '#4ade80' },
  'Saúde':     { bg: 'rgba(251,146,60,0.15)',   border: 'rgba(251,146,60,0.4)',  text: '#fb923c' },
  'Dinheiro':  { bg: 'rgba(250,204,21,0.15)',   border: 'rgba(250,204,21,0.4)',  text: '#facc15' },
  'Outro':     { bg: 'rgba(148,163,184,0.15)',  border: 'rgba(148,163,184,0.4)', text: '#94a3b8' },
};
function getTagStyle(tag) { return tagColors[tag] || { bg: 'rgba(148,163,184,0.15)', border: 'rgba(148,163,184,0.4)', text: '#94a3b8' }; }

const moodScorePT = { 'Alegria':5,'Calma':4,'Empolgação':5,'Cansaço':2,'Preocupação':2,'Tristeza':1,'Ansiedade':1,'Raiva':1,'Frustração':2,'Vazio':1 };
const moodColors = { 'Alegria':'#4ade80','Calma':'#38bdf8','Empolgação':'#f59e0b','Cansaço':'#94a3b8','Preocupação':'#fb923c','Tristeza':'#a78bfa','Ansiedade':'#fb923c','Raiva':'#f87171','Frustração':'#e879f9','Vazio':'#64748b' };
function getMoodScore(mood) { return moodScorePT[mood] || 3; }

function parseTags(tags) {
  if (!tags) return [];
  if (Array.isArray(tags)) return tags;
  if (typeof tags === 'string') { try { const p = JSON.parse(tags); return Array.isArray(p) ? p : [tags]; } catch(e) { return [tags]; } }
  return [];
}

function isHighRiskPatient(records) {
  const last7days = new Date(Date.now() - 7*24*60*60*1000);
  const recent = records.filter(r => new Date(r.created_at) >= last7days);
  return recent.filter(r => r.mood === 'Ansiedade' || r.mood === 'Raiva').length >= 3;
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; await loadPsychologist(); showApp(); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) { currentUser = session.user; await loadPsychologist(); showApp(); }
    else if (event === 'SIGNED_OUT') { showAuth(); }
  });
}

async function loadPsychologist() {
  const { data } = await sb.from('psychologists').select('*').eq('auth_id', currentUser.id).single();
  currentPsychologist = data;
  if (data) document.getElementById('topbar-name').textContent = data.name;
}

function switchTab(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  clearAuthMessages();
}
function clearAuthMessages() { document.getElementById('auth-error').style.display='none'; document.getElementById('auth-success').style.display='none'; }
function showAuthError(msg) { const el=document.getElementById('auth-error'); el.textContent=msg; el.style.display='block'; document.getElementById('auth-success').style.display='none'; }
function showAuthSuccess(msg) { const el=document.getElementById('auth-success'); el.textContent=msg; el.style.display='block'; document.getElementById('auth-error').style.display='none'; }

async function handleLogin() {
  const email=document.getElementById('login-email').value.trim(), password=document.getElementById('login-password').value;
  if (!email||!password) { showAuthError('Preencha todos os campos.'); return; }
  const btn=document.getElementById('btn-login'); btn.disabled=true; btn.textContent='Entrando...'; clearAuthMessages();
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showAuthError('E-mail ou senha incorretos.'); btn.disabled=false; btn.textContent='Entrar'; }
}

async function handleRegister() {
  const name=document.getElementById('reg-name').value.trim(), crp=document.getElementById('reg-crp').value.trim(),
        email=document.getElementById('reg-email').value.trim(), password=document.getElementById('reg-password').value;
  if (!name||!email||!password) { showAuthError('Preencha todos os campos obrigatórios.'); return; }
  if (password.length<6) { showAuthError('Senha deve ter pelo menos 6 caracteres.'); return; }
  const btn=document.getElementById('btn-register'); btn.disabled=true; btn.textContent='Criando conta...'; clearAuthMessages();
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { showAuthError('Erro ao criar conta: '+error.message); btn.disabled=false; btn.textContent='Criar conta'; return; }
  if (data.user) await sb.from('psychologists').insert({ auth_id:data.user.id, name, email, crp:crp||null });
  showAuthSuccess('Conta criada! Faça login para continuar.');
  btn.disabled=false; btn.textContent='Criar conta';
}

async function handleLogout() { await sb.auth.signOut(); }
function showApp() { document.getElementById('auth-screen').style.display='none'; document.getElementById('app-screen').style.display='block'; loadPatients(); }
function showAuth() { document.getElementById('auth-screen').style.display='flex'; document.getElementById('app-screen').style.display='none'; currentUser=null; currentPsychologist=null; }
function showDashboard() { document.getElementById('view-dashboard').classList.add('active'); document.getElementById('view-detail').classList.remove('active'); }
function showDetail() { document.getElementById('view-dashboard').classList.remove('active'); document.getElementById('view-detail').classList.add('active'); }

async function loadPatients() {
  if (!currentPsychologist) return;
  const { data: patients, error } = await sb.from('patients').select('*').eq('psychologist_id', currentPsychologist.id).order('created_at', { ascending: false });
  const container = document.getElementById('patients-container');
  const countEl = document.getElementById('patients-count');
  if (error || !patients || patients.length === 0) {
    countEl.textContent = '';
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">Nenhum paciente ainda</div><div style="font-size:13px;color:var(--muted)">Toque em "+ Novo" para começar.</div></div>';
    return;
  }
  const ids = patients.map(p => p.id);
  const { data: records } = await sb.from('records').select('*').in('patient_id', ids).order('created_at', { ascending: false });
  allPatients = patients; allRecords = records || [];
  countEl.textContent = patients.length + ' paciente' + (patients.length>1?'s':'');
  renderPatients(patients, records || []);
}

function renderPatients(patients, records) {
  const container = document.getElementById('patients-container');
  if (!patients || patients.length === 0) {
    container.innerHTML = '<div class="no-records" style="padding:40px;text-align:center;color:var(--muted)">Nenhum paciente encontrado.</div>';
    return;
  }
  container.innerHTML = '';
  const grid = document.createElement('div'); grid.className = 'patients-grid';
  patients.forEach(patient => {
    const patRecords = records.filter(r => r.patient_id === patient.id);
    const hasRisk = isHighRiskPatient(patRecords);
    const lastRecord = patRecords[0];
    const riskClass = hasRisk ? 'risk-high' : patRecords.length > 0 ? 'risk-ok' : 'risk-medium';
    const riskLabel = hasRisk ? '⚠️ Atenção' : patRecords.length > 0 ? '✓ Ok' : '— Sem dados';
    const lastDate = lastRecord ? new Date(lastRecord.created_at).toLocaleDateString('pt-BR') : 'Nenhum registro';
    const initials = patient.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const colors = ['#16a34a','#0284c7','#7c3aed','#db2777','#ea580c'];
    const color = colors[patient.id % colors.length] || colors[0];
    const card = document.createElement('div'); card.className = 'patient-card';
    card.innerHTML = `
      <div class="patient-card-top">
        <div class="patient-avatar" style="background:${color}">${initials}</div>
        <span class="risk-badge ${riskClass}">${riskLabel}</span>
      </div>
      <div class="patient-name">${patient.name}</div>
      <div class="patient-meta">Último registro: ${lastDate} · ${patRecords.length} registro${patRecords.length!==1?'s':''}</div>
      <div class="patient-link-box" onclick="event.stopPropagation()">
        <span class="patient-link-txt">Código: ${patient.link_token}</span>
        <button class="btn-copy" onclick="copyLink('${patient.link_token}')">Copiar</button>
        <button class="btn-delete" onclick="openDeleteModal(${patient.id}, '${patient.name.replace(/'/g,"\\'")}')">Excluir</button>
      </div>`;
    card.addEventListener('click', () => openPatient(patient, patRecords, color));
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function filterPatients() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { renderPatients(allPatients, allRecords); return; }
  renderPatients(allPatients.filter(p => p.name.toLowerCase().includes(q)), allRecords);
}

function openDeleteModal(patientId, patientName) {
  patientToDelete = patientId;
  document.getElementById('delete-modal-sub').textContent = `Excluir "${patientName}"? Todos os registros serão apagados permanentemente.`;
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('open'); patientToDelete = null; }
async function confirmDelete() {
  if (!patientToDelete) return;
  await sb.from('records').delete().eq('patient_id', patientToDelete);
  await sb.from('patients').delete().eq('id', patientToDelete);
  closeDeleteModal(); showToast('✓ Paciente excluído.'); loadPatients();
}

async function openPatient(patient, preloadedRecords, color) {
  currentPatient = patient; currentColor = color; currentFilter = 7; selectedDayDate = null;
  const initials = patient.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('detail-avatar').style.background = color;
  document.getElementById('detail-avatar').textContent = initials;
  document.getElementById('detail-name').textContent = patient.name;
  document.querySelectorAll('.filter-tab').forEach((b,i) => b.classList.toggle('active', i===0));
  currentRecords = preloadedRecords || [];
  if (!preloadedRecords) {
    const { data } = await sb.from('records').select('*').eq('patient_id', patient.id).order('created_at', { ascending: false });
    currentRecords = data || [];
  }
  document.getElementById('detail-meta').textContent = currentRecords.length+' registro'+(currentRecords.length!==1?'s':'')+' · desde '+new Date(patient.created_at).toLocaleDateString('pt-BR');
  currentReminders = patient.reminder_times || [];
  renderReminders();
  renderDetail();
  showDetail();
}

function renderReminders() {
  const container = document.getElementById('reminder-chips');
  container.innerHTML = '';
  if (currentReminders.length === 0) { container.innerHTML = '<span class="reminder-empty">Nenhum lembrete cadastrado.</span>'; return; }
  [...currentReminders].sort().forEach(time => {
    const chip = document.createElement('div'); chip.className = 'reminder-chip';
    chip.innerHTML = `🔔 ${time} <button class="reminder-chip-remove" onclick="removeReminder('${time}')">✕</button>`;
    container.appendChild(chip);
  });
}

async function addReminder() {
  const input = document.getElementById('reminder-time-input');
  const time = input.value;
  if (!time) { showToast('Selecione um horário.'); return; }
  if (currentReminders.includes(time)) { showToast('Horário já cadastrado.'); return; }
  if (currentReminders.length >= 5) { showToast('Máximo de 5 lembretes.'); return; }
  currentReminders = [...currentReminders, time];
  await saveReminders(); input.value = ''; renderReminders(); showToast('✓ Lembrete adicionado!');
}

async function removeReminder(time) {
  currentReminders = currentReminders.filter(t => t !== time);
  await saveReminders(); renderReminders(); showToast('✓ Lembrete removido.');
}

async function saveReminders() {
  await sb.from('patients').update({ reminder_times: currentReminders }).eq('id', currentPatient.id);
  const p = allPatients.find(p => p.id === currentPatient.id);
  if (p) p.reminder_times = currentReminders;
  currentPatient.reminder_times = currentReminders;
}

function setFilter(days, btn) {
  currentFilter = days; selectedDayDate = null;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderDetail();
}

function filterRecords() {
  const now = new Date();
  if (selectedDayDate) return currentRecords.filter(r => new Date(r.created_at).toDateString() === selectedDayDate);
  if (currentFilter === 1) {
    let f = currentRecords.filter(r => new Date(r.created_at).toDateString() === now.toDateString());
    if (f.length === 0) { const ld = new Date(currentRecords[0].created_at).toDateString(); f = currentRecords.filter(r => new Date(r.created_at).toDateString() === ld); }
    return f;
  }
  const cutoff = new Date(now - currentFilter*24*60*60*1000);
  const f = currentRecords.filter(r => new Date(r.created_at) >= cutoff);
  return f.length > 0 ? f : currentRecords.slice(0,10);
}

function filterRecordsForPeriod() {
  const now = new Date();
  const cutoff = new Date(now - currentFilter*24*60*60*1000);
  const f = currentRecords.filter(r => new Date(r.created_at) >= cutoff);
  return f.length > 0 ? f : currentRecords.slice(0,10);
}

function clearDayFilter() { selectedDayDate = null; renderDetail(); }

function renderDetail() {
  const container = document.getElementById('detail-content');
  if (!currentRecords || currentRecords.length === 0) { container.innerHTML = '<div class="no-records">Nenhum registro ainda.</div>'; return; }
  const filtered = filterRecords();
  const chartData = buildChartData(currentFilter === 1 ? filtered : filterRecordsForPeriod(), currentFilter);
  const triggers = buildTriggers(filtered);
  const alertMsg = checkAlert(filtered);

  let html = `<div class="section"><div class="section-title">📈 Humor — ${currentFilter === 1 ? 'Hoje' : currentFilter+' dias'}</div><div class="chart-wrap"><canvas id="mood-chart"></canvas></div>${currentFilter !== 1 ? '<div class="chart-hint">Toque num ponto para ver o dia</div>' : ''}</div>`;
  if (alertMsg) html += `<div class="alert-box"><span style="font-size:18px">⚠️</span><div class="alert-box-text"><strong>Atenção:</strong> ${alertMsg}</div></div>`;
  if (triggers.length > 0) {
    html += '<div class="section"><div class="section-title">🏷 Gatilhos frequentes</div>';
    triggers.forEach(t => { const color = getTagStyle(t.label).text; html += `<div class="trigger-row"><span class="trigger-label">${t.label}</span><div class="trigger-bar-wrap"><div class="trigger-bar" style="width:${t.pct}%;background:${color}"></div></div><span class="trigger-count">×${t.count}</span></div>`; });
    html += '</div>';
  }
  const recordsTitle = selectedDayDate ? `📋 ${new Date(selectedDayDate).toLocaleDateString('pt-BR')} (${filtered.length})` : `📋 Registros (${filtered.length})`;
  html += `<div class="section"><div class="section-title" style="display:flex;align-items:center;justify-content:space-between">${recordsTitle}${selectedDayDate ? '<button onclick="clearDayFilter()" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif">✕ Ver todos</button>' : ''}</div><div class="records-list" id="records-list"></div></div>`;
  container.innerHTML = html;
  drawChart(chartData);

  const list = document.getElementById('records-list');
  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'record-card' + ((r.mood === 'Ansiedade' || r.mood === 'Raiva') ? ' risk' : '');
    const date = new Date(r.created_at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const moodColor = r.mood_color || moodColors[r.mood] || '#e2eaf4';
    const tags = parseTags(r.tags);
    let inner = `<div class="record-top"><div class="record-mood"><span class="record-emoji">${r.mood_emoji||'😶'}</span><span class="record-label" style="color:${moodColor}">${r.mood}</span></div><span class="record-date">${date}</span></div>`;
    if (tags.length > 0) { inner += '<div class="record-tags">'; tags.forEach(t => { const st = getTagStyle(t); inner += `<span class="record-tag" style="background:${st.bg};border:1px solid ${st.border};color:${st.text}">${t}</span>`; }); inner += '</div>'; }
    if (r.text_note) inner += `<div class="record-text">"${r.text_note}"</div>`;
    if (r.has_audio && r.audio_url) {
      inner += `<div class="record-audio"><audio controls style="width:100%;height:36px;filter:invert(1) hue-rotate(180deg)"><source src="${r.audio_url}" type="audio/mp4"></audio></div>`;
    } else if (r.has_audio) {
      inner += '<div class="record-audio" style="color:var(--blue);font-size:12px">🎙 Áudio gravado</div>';
    }
    card.innerHTML = inner; list.appendChild(card);
  });
}

function buildChartData(records, days) {
  if (days === 1) {
    const byHour = {};
    records.forEach(r => { const key = new Date(r.created_at).getHours()+'h'; if (!byHour[key]) byHour[key] = []; byHour[key].push(getMoodScore(r.mood)); });
    const labels = Object.keys(byHour);
    const data = labels.map(k => Math.round(byHour[k].reduce((a,b)=>a+b,0)/byHour[k].length*10)/10);
    return { labels, data, colors: data.map(v => v<=2?'#f87171':v>=4?'#4ade80':'#38bdf8') };
  } else {
    const byDay = {}, now = new Date(), dateMap = {};
    for (let i = days-1; i >= 0; i--) {
      const d = new Date(now - i*86400000);
      const key = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      byDay[key] = []; dateMap[key] = d.toDateString();
    }
    records.forEach(r => { const key = new Date(r.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); if (byDay[key]!==undefined) byDay[key].push(getMoodScore(r.mood)); });
    const labels = Object.keys(byDay);
    const data = labels.map(k => byDay[k].length>0 ? Math.round(byDay[k].reduce((a,b)=>a+b,0)/byDay[k].length*10)/10 : null);
    return { labels, data, colors: data.map(v => v===null?'#1b2a40':v<=2?'#f87171':v>=4?'#4ade80':'#38bdf8'), dateMap };
  }
}

function drawChart({ labels, data, colors, dateMap }) {
  if (moodChart) { moodChart.destroy(); moodChart = null; }
  const ctx = document.getElementById('mood-chart').getContext('2d');
  moodChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor: currentColor, backgroundColor: currentColor+'18', pointBackgroundColor: colors, pointBorderColor: colors, pointRadius: 5, pointHoverRadius: 8, borderWidth: 2, tension: 0.4, fill: true, spanGaps: true }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, elements) => {
        if (elements.length > 0 && dateMap && currentFilter !== 1) {
          const dateStr = dateMap[labels[elements[0].index]];
          if (dateStr) { selectedDayDate = dateStr; renderDetail(); }
        }
      },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => { const s=['','Muito negativo','Negativo','Neutro','Positivo','Muito positivo']; return s[Math.round(ctx.raw)]||ctx.raw; } } } },
      scales: { x: { ticks: { color:'#5a7090', font:{size:9} }, grid: { color:'#1b2a40' } }, y: { min:0, max:5, ticks: { color:'#5a7090', font:{size:9}, stepSize:1 }, grid: { color:'#1b2a40' } } }
    }
  });
}

function buildTriggers(records) {
  const counts = {};
  records.forEach(r => { parseTags(r.tags).forEach(t => { counts[t] = (counts[t]||0) + 1; }); });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if (sorted.length === 0) return [];
  const max = sorted[0][1];
  return sorted.map(([label,count]) => ({ label, count, pct: Math.round(count/max*100) }));
}

function checkAlert(records) {
  const last7days = new Date(Date.now() - 7*24*60*60*1000);
  const recent = records.filter(r => new Date(r.created_at) >= last7days);
  const highCount = recent.filter(r => r.mood === 'Ansiedade' || r.mood === 'Raiva').length;
  if (highCount >= 3) return highCount + ' registros de Ansiedade ou Raiva nos últimos 7 dias — padrão que merece atenção.';
  const last3 = records.slice(0,3);
  if (last3.length === 3 && last3.every(r => getMoodScore(r.mood) <= 2)) return '3 registros consecutivos com humor negativo.';
  return null;
}

async function openAddModal() { document.getElementById('add-modal').classList.add('open'); document.getElementById('new-patient-name').value=''; document.getElementById('modal-error').style.display='none'; }
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }
async function handleAddPatient() {
  if (!currentPsychologist) return;
  const name = document.getElementById('new-patient-name').value.trim();
  if (!name) { document.getElementById('modal-error').textContent='Digite o nome do paciente.'; document.getElementById('modal-error').style.display='block'; return; }
  const btn=document.getElementById('btn-add-patient'); btn.disabled=true; btn.textContent='Criando...';
  const token = Math.random().toString(36).substring(2, 8).toUpperCase();
  const { error } = await sb.from('patients').insert({ psychologist_id: currentPsychologist.id, name, link_token: token });
  btn.disabled=false; btn.textContent='Criar';
  if (error) { document.getElementById('modal-error').textContent='Erro ao criar paciente.'; document.getElementById('modal-error').style.display='block'; return; }
  closeAddModal(); showToast('✓ Paciente criado!'); loadPatients();
}

function copyLink(code) { navigator.clipboard.writeText(code); showToast('✓ Código copiado!'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

init();
</script>
